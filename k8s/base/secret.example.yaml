# Copy to secret.yaml, fill values, kubectl apply -f secret.yaml

# NEVER commit secret.yaml with real credentials.

apiVersion: v1

kind: Secret

metadata:

  name: c2k-mail-secret

  namespace: c2k

type: Opaque

stringData:

  NODE_ENV: production

  USE_DATABASE: "true"

  DATABASE_URL: postgresql://c2k:CHANGE_ME@c2k-postgres:5432/c2k

  REDIS_URL: redis://c2k-redis:6379

  AUTH_SECRET: CHANGE_ME

  COOKIE_SECRET: CHANGE_ME

  AUTH_ALLOW_FALLBACK: "false"

  CORS_ORIGIN: https://example.com

  C2K_PUBLIC_WEB_URL: https://example.com

  # External S3-compatible storage (required if uploads enabled — no MinIO in k8s base)

  S3_ENDPOINT: https://s3.us-east-1.amazonaws.com

  S3_BUCKET: c2k-uploads-prod

  S3_REGION: us-east-1

  S3_ACCESS_KEY: CHANGE_ME

  S3_SECRET_KEY: CHANGE_ME

  # S3_PUBLIC_BASE_URL: https://cdn.example.com/c2k-uploads-prod

  C2K_MAIL_TRANSPORT: smtp

  C2K_MAIL_FROM: "Kink.Social <noreply@kink.social>"

  C2K_MAIL_REPLY_TO: support@kink.social

  SMTP_HOST: smtp.example.com

  SMTP_PORT: "587"

  SMTP_SECURE: "false"

  SMTP_USER: ""

  SMTP_PASS: ""

  C2K_PLATFORM_MAIL_BCC: admin@kink.social

  C2K_PLATFORM_ADMIN_EMAILS: admin@kink.social

  # Optional product mail flags

  C2K_ORG_JOIN_EMAIL: "true"

  C2K_EVENT_RSVP_EMAIL: "true"

  C2K_SCOPE_EMAIL_DOUBLE_OPTIN: "false"

  # Web push (C215) — generate with: npx web-push generate-vapid-keys

  VAPID_PUBLIC_KEY: ""

  VAPID_PRIVATE_KEY: ""

  VAPID_SUBJECT: "mailto:admin@kink.social"

  C2K_PUSH_ANNOUNCEMENTS: "true"

  C2K_PUSH_CHAT: "true"

  # Multi-replica API — see docs/REALTIME_SCALING.md

  # C2K_REALTIME_REDIS_BRIDGE: "true"

  # ECKE outbound (optional — keep disabled until ECKE ready)

  # ECKE_PUBLISH_ENABLED: "false"

  # ECKE_SUPABASE_URL: https://YOUR-ECKE-PROJECT.supabase.co

  # ECKE_SUPABASE_SERVICE_ROLE_KEY: ""

