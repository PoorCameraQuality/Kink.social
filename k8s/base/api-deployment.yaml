apiVersion: apps/v1
kind: Deployment
metadata:
  name: c2k-api
  namespace: c2k
spec:
  replicas: 2
  selector:
    matchLabels:
      app: c2k-api
  template:
    metadata:
      labels:
        app: c2k-api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/c2k-api:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: c2k-api-config
            - secretRef:
                name: c2k-mail-secret
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: c2k-api
  namespace: c2k
spec:
  selector:
    app: c2k-api
  ports:
    - port: 3001
      targetPort: 3001
