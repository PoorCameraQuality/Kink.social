# Optional Typesense for local search development (Pass 2B).
# Not started by default — use profile `search`:
#   docker compose -f docker-compose.dev.yml -f docker-compose.search.yml --profile search up -d
#
# Dev keys below are for local use only — rotate for any shared/staging environment.

services:
  typesense:
    image: typesense/typesense:27.1
    profiles: [search]
    restart: unless-stopped
    ports:
      - '8108:8108'
    volumes:
      - typesense_data:/data
    command: >
      --data-dir /data
      --api-key=dev-typesense-admin-key
      --enable-cors
    environment:
      TYPESENSE_DATA_DIR: /data

volumes:
  typesense_data:
