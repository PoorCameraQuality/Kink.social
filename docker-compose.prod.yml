# Production stack — deploy on a VPS with DNS pointed at this host.
# Copy .env.production.example → .env.production and fill secrets.
# Object storage: NO MinIO in this compose — configure external S3_* in .env.production.
# Local filesystem uploads are not production-safe; see docs/DEPLOYMENT_RUNBOOK.md §8.
services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      C2K_PUBLIC_LAUNCH: ${C2K_PUBLIC_LAUNCH:-false}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        # Same-origin prod: leave empty (browser uses relative /api). Split API: full URL.
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_SITE_URL: ${VITE_SITE_URL:-https://kink.social}
        VITE_PUBLIC_LAUNCH: ${VITE_PUBLIC_LAUNCH:-false}
        VITE_LEGAL_PUBLISHED: ${VITE_LEGAL_PUBLISHED:-false}
        # VITE_HOME_DEMO_FALLBACK unset = production (no demo catalog)
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3001
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: ['node', 'dist/worker.js']
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-c2k}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-c2k}
    volumes:
      - c2k_pgdata_prod:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - c2k_redisdata_prod:/data

volumes:
  caddy_data:
  caddy_config:
  c2k_pgdata_prod:
  c2k_redisdata_prod:
