# Deploy to VPS via tarball extract (prod tree at /opt/c2k is not always a git clone).
# Required secret: SSH_PASS (root password). Host/user/path are fixed for kink.social prod.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create deploy tarball
        run: |
          tar -czf deploy.tgz --exclude-from=.deployignore .

      - name: Upload tarball to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 2.25.196.84
          username: root
          password: ${{ secrets.SSH_PASS }}
          source: deploy.tgz
          target: /tmp

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 2.25.196.84
          username: root
          password: ${{ secrets.SSH_PASS }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            REMOTE=/opt/c2k
            cd "$REMOTE"
            stamp=$(date -u +%Y%m%dT%H%M%SZ)
            if [ -f .env.production ]; then
              cp -a .env.production ".env.production.bak-${stamp}"
            fi
            COMPOSE="docker compose -f docker-compose.prod.yml -f docker-compose.prod.vps.yml --env-file .env.production"
            users_before=$($COMPOSE exec -T postgres psql -U c2k -d c2k -t -c "SELECT count(*) FROM users;" 2>/dev/null | tr -d ' ' || echo 0)
            echo "users_before=${users_before}"
            tar -xzf /tmp/deploy.tgz -C "$REMOTE"
            rm -f /tmp/deploy.tgz
            bash scripts/vps/remote-deploy-steps.sh
            users_after=$($COMPOSE exec -T postgres psql -U c2k -d c2k -t -c "SELECT count(*) FROM users;" | tr -d ' ')
            echo "users_after=${users_after}"
            curl -sf https://kink.social/api/health/ready
            echo "Deploy complete."
